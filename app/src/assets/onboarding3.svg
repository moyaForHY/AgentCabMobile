<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <defs>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Phone shadow -->
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2563eb" flood-opacity="0.2"/>
    </filter>
    <!-- Icon shadow -->
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#2563eb" flood-opacity="0.12"/>
    </filter>
    <!-- Screen gradient -->
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <!-- Ray gradient -->
    <radialGradient id="rayGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <!-- Circuit pattern gradient -->
    <linearGradient id="circuitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="240" fill="#f8fafc" rx="12"/>

  <!-- ==================== -->
  <!-- Subtle radial glow behind phone -->
  <!-- ==================== -->
  <circle cx="140" cy="120" r="90" fill="url(#rayGrad)"/>

  <!-- ==================== -->
  <!-- CONNECTION LINES: Phone to capability icons -->
  <!-- ==================== -->

  <!-- Line to SMS (top-left) -->
  <line x1="124" y1="82" x2="58" y2="44" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Line to Camera (top-right) -->
  <line x1="156" y1="82" x2="222" y2="44" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Line to Calendar (left) -->
  <line x1="118" y1="120" x2="46" y2="120" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Line to Phone/Call (right) -->
  <line x1="162" y1="120" x2="234" y2="120" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Line to Location (bottom-left) -->
  <line x1="124" y1="158" x2="58" y2="196" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
  <!-- Line to Gallery (bottom-right) -->
  <line x1="156" y1="158" x2="222" y2="196" stroke="#2563eb" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Glowing dots at connection endpoints on phone side -->
  <circle cx="124" cy="82" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>
  <circle cx="156" cy="82" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>
  <circle cx="118" cy="120" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>
  <circle cx="162" cy="120" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>
  <circle cx="124" cy="158" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>
  <circle cx="156" cy="158" r="2" fill="#2563eb" opacity="0.4" filter="url(#glow)"/>

  <!-- ==================== -->
  <!-- CENTER: Smartphone -->
  <!-- ==================== -->

  <g transform="translate(140, 120)" filter="url(#phoneShadow)">
    <!-- Phone body -->
    <rect x="-28" y="-50" width="56" height="100" rx="8" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Screen area -->
    <rect x="-22" y="-40" width="44" height="76" rx="3" fill="url(#screenGrad)"/>

    <!-- AI Circuit pattern on screen -->
    <!-- Central node -->
    <circle cx="0" cy="-6" r="4" fill="#2563eb" opacity="0.5"/>
    <!-- Inner ring of nodes -->
    <circle cx="-12" cy="-16" r="2" fill="#3b82f6" opacity="0.4"/>
    <circle cx="12" cy="-16" r="2" fill="#3b82f6" opacity="0.4"/>
    <circle cx="-14" cy="4" r="2" fill="#3b82f6" opacity="0.35"/>
    <circle cx="14" cy="4" r="2" fill="#3b82f6" opacity="0.35"/>
    <circle cx="-8" cy="16" r="2" fill="#60a5fa" opacity="0.3"/>
    <circle cx="8" cy="16" r="2" fill="#60a5fa" opacity="0.3"/>
    <circle cx="0" cy="24" r="1.5" fill="#60a5fa" opacity="0.25"/>

    <!-- Circuit connections -->
    <line x1="0" y1="-6" x2="-12" y2="-16" stroke="url(#circuitGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="12" y2="-16" stroke="url(#circuitGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="-14" y2="4" stroke="url(#circuitGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="14" y2="4" stroke="url(#circuitGrad)" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="-8" y2="16" stroke="url(#circuitGrad)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="8" y2="16" stroke="url(#circuitGrad)" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="-8" y1="16" x2="0" y2="24" stroke="url(#circuitGrad)" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="0" y2="24" stroke="url(#circuitGrad)" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Cross connections -->
    <line x1="-12" y1="-16" x2="-14" y2="4" stroke="url(#circuitGrad)" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="12" y1="-16" x2="14" y2="4" stroke="url(#circuitGrad)" stroke-width="0.6" stroke-linecap="round"/>

    <!-- Phone top notch/speaker -->
    <rect x="-8" y="-46" width="16" height="3" rx="1.5" fill="#cbd5e1" opacity="0.5"/>
    <!-- Phone bottom bar -->
    <rect x="-10" y="38" width="20" height="3" rx="1.5" fill="#cbd5e1" opacity="0.4"/>
  </g>

  <!-- ==================== -->
  <!-- CAPABILITY ICONS (surrounding the phone) -->
  <!-- ==================== -->

  <!-- Icon 1: SMS Envelope (top-left) -->
  <g transform="translate(50, 38)" filter="url(#iconShadow)">
    <rect x="-16" y="-12" width="32" height="24" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Envelope body -->
    <rect x="-12" y="-7" width="24" height="16" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8" opacity="0.8"/>
    <!-- Envelope flap -->
    <polyline points="-12,-7 0,3 12,-7" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6" stroke-linejoin="round"/>
    <!-- Small notification dot -->
    <circle cx="11" cy="-5" r="3" fill="#2563eb" opacity="0.7"/>
  </g>

  <!-- Icon 2: Camera (top-right) -->
  <g transform="translate(230, 38)" filter="url(#iconShadow)">
    <rect x="-16" y="-12" width="32" height="24" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Camera body -->
    <rect x="-10" y="-4" width="20" height="13" rx="2.5" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8" opacity="0.7"/>
    <!-- Camera bump -->
    <rect x="-4" y="-8" width="8" height="5" rx="1.5" fill="#bfdbfe" stroke="#2563eb" stroke-width="0.6" opacity="0.6"/>
    <!-- Lens -->
    <circle cx="0" cy="3" r="4" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="3" r="1.5" fill="#2563eb" opacity="0.5"/>
  </g>

  <!-- Icon 3: Calendar (left) -->
  <g transform="translate(38, 120)" filter="url(#iconShadow)">
    <rect x="-16" y="-14" width="32" height="28" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Calendar top -->
    <rect x="-12" y="-10" width="24" height="8" rx="2" fill="#a5b4fc" opacity="0.6"/>
    <!-- Binding bumps -->
    <rect x="-6" y="-12" width="3" height="4" rx="1" fill="#6366f1" opacity="0.5"/>
    <rect x="3" y="-12" width="3" height="4" rx="1" fill="#6366f1" opacity="0.5"/>
    <!-- Grid -->
    <circle cx="-6" cy="4" r="1.2" fill="#6366f1" opacity="0.4"/>
    <circle cx="0" cy="4" r="1.2" fill="#6366f1" opacity="0.4"/>
    <circle cx="6" cy="4" r="1.2" fill="#6366f1" opacity="0.4"/>
    <circle cx="-6" cy="10" r="1.2" fill="#6366f1" opacity="0.3"/>
    <!-- Highlighted day -->
    <circle cx="0" cy="10" r="2.5" fill="#2563eb" opacity="0.6"/>
    <circle cx="6" cy="10" r="1.2" fill="#6366f1" opacity="0.3"/>
  </g>

  <!-- Icon 4: Phone/Call (right) -->
  <g transform="translate(242, 120)" filter="url(#iconShadow)">
    <rect x="-16" y="-14" width="32" height="28" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Phone handset -->
    <path d="M-7,-5 C-7,-8 -5,-9 -2,-9 L-1,-5 L-3,-3 C-1,1 3,4 5,3 L7,1 L10,2 C10,5 9,7 6,7 C0,7 -7,2 -7,-5Z"
          fill="#2563eb" opacity="0.55"/>
    <!-- Signal waves -->
    <path d="M4,-6 C7,-4 7,0 4,2" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.4"/>
    <path d="M6,-8 C10,-5 10,1 6,4" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Icon 5: Location Pin (bottom-left) -->
  <g transform="translate(50, 200)" filter="url(#iconShadow)">
    <rect x="-16" y="-14" width="32" height="28" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Pin shape -->
    <path d="M0,-8 C-6,-8 -9,-4 -9,0 C-9,5 0,12 0,12 C0,12 9,5 9,0 C9,-4 6,-8 0,-8Z"
          fill="#dbeafe" stroke="#2563eb" stroke-width="0.8" opacity="0.7"/>
    <!-- Pin center dot -->
    <circle cx="0" cy="0" r="3" fill="#2563eb" opacity="0.6"/>
  </g>

  <!-- Icon 6: Photo Gallery (bottom-right) -->
  <g transform="translate(230, 200)" filter="url(#iconShadow)">
    <rect x="-16" y="-14" width="32" height="28" rx="5" fill="white" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- Back card -->
    <rect x="-8" y="-9" width="18" height="14" rx="2" fill="#bfdbfe" stroke="#2563eb" stroke-width="0.5" opacity="0.4"/>
    <!-- Front card -->
    <rect x="-10" y="-6" width="18" height="14" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="0.6" opacity="0.7"/>
    <!-- Mountain landscape in photo -->
    <polygon points="-6,6 -2,-1 2,4 5,-2 8,6" fill="#2563eb" opacity="0.3"/>
    <!-- Sun -->
    <circle cx="4" cy="-2" r="2" fill="#60a5fa" opacity="0.5"/>
  </g>

  <!-- ==================== -->
  <!-- Decorative elements -->
  <!-- ==================== -->

  <!-- Subtle ambient dots -->
  <circle cx="90" cy="28" r="1" fill="#2563eb" opacity="0.1"/>
  <circle cx="190" cy="28" r="1" fill="#2563eb" opacity="0.1"/>
  <circle cx="30" cy="80" r="1.5" fill="#3b82f6" opacity="0.08"/>
  <circle cx="250" cy="80" r="1.5" fill="#3b82f6" opacity="0.08"/>
  <circle cx="30" cy="165" r="1" fill="#6366f1" opacity="0.08"/>
  <circle cx="250" cy="165" r="1" fill="#6366f1" opacity="0.08"/>
  <circle cx="90" cy="218" r="1" fill="#2563eb" opacity="0.1"/>
  <circle cx="190" cy="218" r="1" fill="#2563eb" opacity="0.1"/>
</svg>