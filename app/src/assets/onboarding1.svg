<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 240" width="280" height="240">
  <defs>
    <!-- Glow filter for orbs -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow for platform -->
    <filter id="platformShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563eb" flood-opacity="0.2"/>
    </filter>
    <!-- Gradient for platform -->
    <linearGradient id="platformGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <!-- Orb gradient -->
    <radialGradient id="orbGrad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </radialGradient>
    <!-- Received orb gradient (slightly different hue for consumers) -->
    <radialGradient id="orbGradReceived" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    <!-- Flow line gradient left to center -->
    <linearGradient id="flowLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Flow line gradient center to right -->
    <linearGradient id="flowRight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrowRight" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#2563eb" fill-opacity="0.5"/>
    </marker>
    <marker id="arrowRightEnd" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#6366f1" fill-opacity="0.4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="280" height="240" fill="#f8fafc" rx="12"/>

  <!-- ==================== -->
  <!-- LEFT SIDE: Authors/Creators -->
  <!-- ==================== -->

  <!-- Author 1 (top-left) -->
  <g transform="translate(32, 52)">
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#64748b"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#94a3b8"/>
    <!-- Glowing orb -->
    <circle cx="18" cy="8" r="5" fill="url(#orbGrad)" filter="url(#glow)" opacity="0.9"/>
  </g>

  <!-- Author 2 (mid-left) -->
  <g transform="translate(24, 108)">
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#64748b"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#94a3b8"/>
    <!-- Glowing orb -->
    <circle cx="20" cy="6" r="5.5" fill="url(#orbGrad)" filter="url(#glow)" opacity="0.9"/>
  </g>

  <!-- Author 3 (bottom-left) -->
  <g transform="translate(36, 164)">
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#64748b"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#94a3b8"/>
    <!-- Glowing orb -->
    <circle cx="17" cy="9" r="4.5" fill="url(#orbGrad)" filter="url(#glow)" opacity="0.9"/>
  </g>

  <!-- ==================== -->
  <!-- FLOW LINES: Left to Center -->
  <!-- ==================== -->

  <!-- Author 1 to platform -->
  <path d="M55,60 C85,60 95,95 115,100" stroke="url(#flowLeft)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <!-- Author 2 to platform -->
  <path d="M50,114 C75,114 90,115 115,118" stroke="url(#flowLeft)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>
  <!-- Author 3 to platform -->
  <path d="M58,173 C85,170 95,145 115,138" stroke="url(#flowLeft)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRight)"/>

  <!-- ==================== -->
  <!-- CENTER: Marketplace Platform -->
  <!-- ==================== -->

  <g transform="translate(140, 120)" filter="url(#platformShadow)">
    <!-- Main platform hexagonal shape approximated as rounded rect -->
    <rect x="-28" y="-32" width="56" height="64" rx="10" fill="url(#platformGrad)" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.4"/>

    <!-- Grid dots representing marketplace listings -->
    <circle cx="-12" cy="-14" r="4" fill="#2563eb" opacity="0.7"/>
    <circle cx="4" cy="-14" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="-12" cy="0" r="4" fill="#3b82f6" opacity="0.6"/>
    <circle cx="4" cy="0" r="4" fill="#2563eb" opacity="0.7"/>
    <circle cx="-12" cy="14" r="4" fill="#60a5fa" opacity="0.5"/>
    <circle cx="4" cy="14" r="4" fill="#60a5fa" opacity="0.5"/>

    <!-- Small connecting lines between dots -->
    <line x1="-12" y1="-10" x2="-12" y2="-4" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="4" y1="-10" x2="4" y2="-4" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="-8" y1="-14" x2="0" y2="-14" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="-8" y1="0" x2="0" y2="0" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="-12" y1="4" x2="-12" y2="10" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="4" y1="4" x2="4" y2="10" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
    <line x1="-8" y1="14" x2="0" y2="14" stroke="#2563eb" stroke-width="0.7" opacity="0.3"/>
  </g>

  <!-- ==================== -->
  <!-- FLOW LINES: Center to Right -->
  <!-- ==================== -->

  <!-- Platform to User 1 -->
  <path d="M170,100 C190,95 200,65 220,60" stroke="url(#flowRight)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRightEnd)"/>
  <!-- Platform to User 2 -->
  <path d="M170,118 C190,118 205,114 220,114" stroke="url(#flowRight)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRightEnd)"/>
  <!-- Platform to User 3 -->
  <path d="M170,138 C190,145 200,168 220,170" stroke="url(#flowRight)" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRightEnd)"/>

  <!-- ==================== -->
  <!-- RIGHT SIDE: Users/Consumers -->
  <!-- ==================== -->

  <!-- User 1 (top-right) -->
  <g transform="translate(244, 52)">
    <!-- Received orb (on left side of user) -->
    <circle cx="-18" cy="8" r="4.5" fill="url(#orbGradReceived)" filter="url(#glow)" opacity="0.8"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#a5b4fc"/>
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#6366f1" opacity="0.7"/>
  </g>

  <!-- User 2 (mid-right) -->
  <g transform="translate(252, 108)">
    <!-- Received orb -->
    <circle cx="-20" cy="6" r="5" fill="url(#orbGradReceived)" filter="url(#glow)" opacity="0.8"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#a5b4fc"/>
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#6366f1" opacity="0.7"/>
  </g>

  <!-- User 3 (bottom-right) -->
  <g transform="translate(240, 164)">
    <!-- Received orb -->
    <circle cx="-16" cy="9" r="4" fill="url(#orbGradReceived)" filter="url(#glow)" opacity="0.8"/>
    <!-- Head -->
    <circle cx="0" cy="6" r="6" fill="#a5b4fc"/>
    <!-- Body -->
    <rect x="-6" y="12" width="12" height="14" rx="3" fill="#6366f1" opacity="0.7"/>
  </g>

  <!-- Subtle decorative dots -->
  <circle cx="80" cy="38" r="1.5" fill="#2563eb" opacity="0.15"/>
  <circle cx="200" cy="42" r="1.5" fill="#6366f1" opacity="0.15"/>
  <circle cx="90" cy="200" r="1.5" fill="#2563eb" opacity="0.12"/>
  <circle cx="195" cy="198" r="1.5" fill="#6366f1" opacity="0.12"/>
  <circle cx="140" cy="30" r="1" fill="#3b82f6" opacity="0.1"/>
  <circle cx="140" cy="210" r="1" fill="#3b82f6" opacity="0.1"/>
</svg>